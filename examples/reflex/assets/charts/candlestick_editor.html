  drawPaneFilledLine(
    view,
    ctx,
    pane,
    series.x,
    series.drawdown_y,
    yMin,
    yMax,
    rgba(color, 0.92),
    rgba(color, 0.20),
    0
  );
}

function drawReturnsDistribution(view, ctx, layer) {
  const series = layer.props && layer.props.series;
  if (!series || !Array.isArray(series.bin_edges) || !Array.isArray(series.y)) return;
  const edges = series.bin_edges;
  const y = series.y;
  if (edges.length < 2 || !y.length) return;
  const p = view.plot;
  const barColor = view._layerColor(layer, "bar_color", [0.20, 0.40, 0.78, 1]);
  const markerColor = view._layerColor(layer, "marker_color", [0.86, 0.19, 0.22, 1]);
  ctx.save();
  ctx.fillStyle = rgba(barColor, Number(layer.style && layer.style.opacity) || 0.62);
  ctx.strokeStyle = rgba(barColor, 0.88);
  ctx.lineWidth = 1;
  for (let i = 0; i < Math.min(y.length, edges.length - 1); i++) {
    const x0 = view._dataToScreenX(Number(edges[i]));
    const x1 = view._dataToScreenX(Number(edges[i + 1]));
    const v = Number(y[i]);
    if (!Number.isFinite(x0) || !Number.isFinite(x1) || !Number.isFinite(v) || v < 0) continue;
    const left = Math.min(x0, x1) + 1;
    const right = Math.max(x0, x1) - 1;
    const top = view._dataToScreenY(v);
    const base = view._dataToScreenY(0);
    const w = Math.max(1, right - left);
    const h = Math.max(1, base - top);
    ctx.fillRect(left, top, w, h);
    ctx.strokeRect(left, top, w, h);
  }
  ctx.restore();

  const markers = Array.isArray(series.markers) ? series.markers : [];
  for (const marker of markers) {
    const x = view._dataToScreenX(Number(marker.x));
    if (!Number.isFinite(x)) continue;
    drawLine(ctx, x, p.y, x, p.y + p.h, rgba(markerColor, 0.92), 1.25, [5, 4]);
    drawLabel(ctx, marker.label || marker.role || "risk", x + 6, p.y + 18, "#fff", rgba(markerColor, 0.92));
  }
}

function drawOscillatorPane(view, ctx, layer) {
  const pane = view._oscillatorPaneFor(layer);
  const series = layer.props && layer.props.series;
  if (!pane || !series || !Array.isArray(series.x)) return;
  if (layer.kind === "rsi") {
    const [yMin, yMax] = oscillatorRange(series, ["rsi"], [0, 100]);
    drawPaneFrame(view, ctx, layer, pane, yMin, yMax, oscillatorLabel(layer));
    const color = rgba(view._layerColor(layer, "color", [0.25, 0.46, 0.95, 1]), 0.98);
    drawPaneLine(view, ctx, pane, series.x, series.rsi, yMin, yMax, color, Number(layer.style && layer.style.width) || 1.35);
    return;
  }
  if (layer.kind === "macd") {
    const [yMin, yMax] = oscillatorRange(series, ["macd", "signal", "histogram"], [-1, 1]);
    drawPaneFrame(view, ctx, layer, pane, yMin, yMax, oscillatorLabel(layer));
    drawMacdHistogram(view, ctx, layer, pane, series, yMin, yMax);
    const macdColor = rgba(view._layerColor(layer, "color", [0.25, 0.46, 0.95, 1]), 0.98);
    const signalColor = rgba(view._layerColor(layer, "signal_color", [0.96, 0.62, 0.04, 1]), 0.96);
    drawPaneLine(view, ctx, pane, series.x, series.macd, yMin, yMax, macdColor, Number(layer.style && layer.style.width) || 1.25);
    drawPaneLine(view, ctx, pane, series.x, series.signal, yMin, yMax, signalColor, Number(layer.style && layer.style.signal_width) || 1.15);
    return;
  }
  if (layer.kind === "stochastic") {
    const [yMin, yMax] = oscillatorRange(series, ["k", "d"], [0, 100]);
    drawPaneFrame(view, ctx, layer, pane, yMin, yMax, oscillatorLabel(layer));
    const kColor = rgba(view._layerColor(layer, "color", [0.25, 0.46, 0.95, 1]), 0.98);
    const dColor = rgba(view._layerColor(layer, "signal_color", [0.96, 0.62, 0.04, 1]), 0.96);
    drawPaneLine(view, ctx, pane, series.x, series.k, yMin, yMax, kColor, Number(layer.style && layer.style.width) || 1.25);
    drawPaneLine(view, ctx, pane, series.x, series.d, yMin, yMax, dColor, Number(layer.style && layer.style.signal_width) || 1.15);
  }
}

function patternSlotWidth(xs, i) {
  if (xs.length <= 1) return 7;
  const prev = i > 0 ? xs[i] - xs[i - 1] : xs[1] - xs[0];
  const next = i < xs.length - 1 ? xs[i + 1] - xs[i] : prev;
  const slot = Math.min(Math.abs(prev), Math.abs(next));
  return Math.max(3, Math.min(18, slot * 0.62));
}

function drawBarsPattern(view, ctx, layer) {
  const props = layer.props || {};
  const pattern = props.pattern;
  if (!pattern || !Array.isArray(pattern.x) || !pattern.x.length) {
    drawRangeStudy(view, ctx, layer);
    return;
  }
  const xs = pattern.x.map((v) => view._dataToScreenX(layerNumber(v)));
  const open = pattern.open || [];
  const high = pattern.high || [];
  const low = pattern.low || [];
  const close = pattern.close || [];
  const color = view._layerColor(layer, "color", [0.56, 0.64, 0.76, 1]);
  const upColor = view._layerColor(layer, "up_color", [0.13, 0.67, 0.58, 1]);
  const downColor = view._layerColor(layer, "down_color", [0.95, 0.21, 0.27, 1]);
  const wickColor = view._layerColor(layer, "wick_color", [0.58, 0.65, 0.76, 1]);
  const mode = props.mode || "candlestick";
  const p = view.plot;

  ctx.save();
  ctx.globalAlpha = Number(layer.style && layer.style.opacity) || 0.74;
  ctx.strokeStyle = rgba(color, 0.55);
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1;
  const firstX = xs.find((x) => Number.isFinite(x));
  if (Number.isFinite(firstX)) {
    ctx.beginPath();
    ctx.moveTo(firstX, p.y);
    ctx.lineTo(firstX, p.y + p.h);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  if (mode === "line") {
    ctx.strokeStyle = rgba(color, 0.95);
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < xs.length; i++) {
      const x = xs[i];
      const y = view._dataToScreenY(Number(close[i]));
      if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
      if (started) ctx.lineTo(x, y);
      else {
        ctx.moveTo(x, y);
        started = true;
      }
    }
    ctx.stroke();
  } else {
    for (let i = 0; i < xs.length; i++) {
      const x = xs[i];
      const o = Number(open[i]);
      const h = Number(high[i]);
      const l = Number(low[i]);
      const c = Number(close[i]);
      if (![x, o, h, l, c].every(Number.isFinite)) continue;
      const yo = view._dataToScreenY(o);
      const yh = view._dataToScreenY(h);
      const yl = view._dataToScreenY(l);
      const yc = view._dataToScreenY(c);
      const up = c >= o;
      const w = patternSlotWidth(xs, i);
      ctx.strokeStyle = rgba(wickColor, 0.82);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, yh);
      ctx.lineTo(x, yl);
      ctx.stroke();
      const bodyTop = Math.min(yo, yc);
      const bodyH = Math.max(1, Math.abs(yc - yo));
      if (mode === "ohlc") {
        const col = up ? upColor : downColor;
        ctx.strokeStyle = rgba(col, 0.95);
        ctx.beginPath();
        ctx.moveTo(x - w / 2, yo);
        ctx.lineTo(x, yo);
        ctx.moveTo(x, yc);
        ctx.lineTo(x + w / 2, yc);
        ctx.stroke();
      } else if (up) {
        ctx.fillStyle = "rgba(13,17,26,.78)";
        ctx.strokeStyle = rgba(upColor, 0.95);
        ctx.fillRect(x - w / 2, bodyTop, w, bodyH);
        ctx.strokeRect(x - w / 2, bodyTop, w, bodyH);
      } else {
        ctx.fillStyle = rgba(downColor, 0.82);
        ctx.strokeStyle = rgba(downColor, 0.95);
        ctx.fillRect(x - w / 2, bodyTop, w, bodyH);
        ctx.strokeRect(x - w / 2, bodyTop, w, bodyH);
      }
    }
  }
  ctx.restore();

  const anchor = layerAnchor(view, layer, "destination");
  const labelX = finitePoint(anchor) ? view._dataToScreenX(anchor.x) + 6 : (firstX || p.x) + 6;
  const labelY = finitePoint(anchor) ? view._dataToScreenY(anchor.y) - 18 : p.y + 28;
  drawLabel(ctx, "Bars pattern", labelX, labelY, "#fff", rgba(color, 0.78));
}

function drawRangeStudy(view, ctx, layer) {
  const start = layerAnchor(view, layer, "start");
  const end = layerAnchor(view, layer, "end");
  if (!start || !end || !Number.isFinite(start.x) || !Number.isFinite(end.x)) return;
  const p = view.plot;
  const x0 = view._dataToScreenX(start.x);
  const x1 = view._dataToScreenX(end.x);
  const color = view._layerColor(layer, "color", [0.56, 0.64, 0.76, 1]);
  ctx.save();
  ctx.fillStyle = rgba(color, 0.08);
  ctx.fillRect(Math.min(x0, x1), p.y, Math.abs(x1 - x0), p.h);
  ctx.restore();
  drawLine(ctx, x0, p.y, x0, p.y + p.h, rgba(color, 0.9), 1, [4, 4]);
  drawLine(ctx, x1, p.y, x1, p.y + p.h, rgba(color, 0.9), 1, [4, 4]);
  if (layer.kind === "fixed_range_volume_profile") {
    drawVolumeProfile(view, ctx, layer, { x0, x1 });
  }
  drawLabel(ctx, layer.kind === "fixed_range_volume_profile" ? "FRVP" : "Range", Math.max(x0, x1) + 6, p.y + 16, "#fff");
}

function drawPattern(view, ctx, layer) {
  const labels = layer.kind === "xabcd_pattern" ? "XABCD" : "ABCD";
  const pts = [];
  for (const label of labels) {
    const p = layerAnchor(view, layer, label);
    if (!finitePoint(p)) return;
    pts.push({ label, x: view._dataToScreenX(p.x), y: view._dataToScreenY(p.y) });
  }
  const color = rgba(view._layerColor(layer, "color", [0.64, 0.45, 0.95, 1]), 1);
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = "rgba(126,87,194,.10)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
  ctx.stroke();
  if (pts.length > 3) {
    ctx.lineTo(pts[0].x, pts[0].y);
    ctx.fill();
  }
  ctx.restore();
  for (const p of pts) {
    drawHandle(ctx, p.x, p.y, color);
    drawLabel(ctx, p.label, p.x + 6, p.y - 8, "#fff");
  }
}

function drawGhostFeed(view, ctx, layer) {
  const anchor = layerAnchor(view, layer, "anchor");
  if (!finitePoint(anchor)) return;
  const p = view.plot;
  const props = layer.props || {};
  const feed = props.feed;
  if (feed && Array.isArray(feed.x) && feed.x.length) {
    const xs = feed.x.map((v) => view._dataToScreenX(layerNumber(v)));
    const open = feed.open || [];
    const high = feed.high || [];
    const low = feed.low || [];
    const close = feed.close || [];
    const color = view._layerColor(layer, "color", [0.58, 0.67, 0.8, 1]);
    const upColor = view._layerColor(layer, "up_color", [0.56, 0.72, 0.86, 1]);
    const downColor = view._layerColor(layer, "down_color", [0.84, 0.48, 0.57, 1]);
    const wickColor = view._layerColor(layer, "wick_color", [0.58, 0.67, 0.8, 1]);
    ctx.save();
    ctx.globalAlpha = Number(layer.style && layer.style.opacity) || 0.42;
    ctx.strokeStyle = rgba(color, 0.78);
    ctx.setLineDash([5, 4]);
    ctx.lineWidth = 1;
    const firstX = xs.find((x) => Number.isFinite(x));
    if (Number.isFinite(firstX)) {
      ctx.beginPath();
      ctx.moveTo(firstX, p.y);
      ctx.lineTo(firstX, p.y + p.h);
      ctx.stroke();
    }
    ctx.setLineDash([]);
    for (let i = 0; i < xs.length; i++) {
      const x = xs[i];
      const o = Number(open[i]);
      const h = Number(high[i]);
      const l = Number(low[i]);
      const c = Number(close[i]);
      if (![x, o, h, l, c].every(Number.isFinite)) continue;
      const yo = view._dataToScreenY(o);
      const yh = view._dataToScreenY(h);
      const yl = view._dataToScreenY(l);
      const yc = view._dataToScreenY(c);
      const up = c >= o;
      const w = patternSlotWidth(xs, i);
      ctx.strokeStyle = rgba(wickColor, 0.78);
      ctx.beginPath();
      ctx.moveTo(x, yh);
      ctx.lineTo(x, yl);
      ctx.stroke();
      const bodyTop = Math.min(yo, yc);
      const bodyH = Math.max(1, Math.abs(yc - yo));
      const bodyColor = up ? upColor : downColor;
      ctx.fillStyle = up ? rgba(bodyColor, 0.20) : rgba(bodyColor, 0.36);
      ctx.strokeStyle = rgba(bodyColor, 0.82);
      ctx.fillRect(x - w / 2, bodyTop, w, bodyH);
      ctx.strokeRect(x - w / 2, bodyTop, w, bodyH);
    }
    ctx.restore();
    drawLabel(ctx, "Ghost feed", view._dataToScreenX(anchor.x) + 6, view._dataToScreenY(anchor.y) - 18, "#fff", rgba(color, 0.72));
    return;
  }
  const bars = Math.min(48, Math.max(1, Number(props.bars || 12)));
  const dx = Math.max(5, p.w / 80);
  const dir = props.direction === "down" ? 1 : -1;
  const color = view._layerColor(layer, "color", [0.58, 0.67, 0.8, 1]);
  let x = view._dataToScreenX(anchor.x);
  let y = view._dataToScreenY(anchor.y);
  ctx.save();
  ctx.strokeStyle = rgba(color, 0.55);
  ctx.fillStyle = rgba(color, 0.16);
  ctx.lineWidth = 1;
  for (let i = 0; i < bars; i++) {
    const bodyH = 8 + (i % 5);
    const wickH = bodyH + 8;
    const cx = x + (i + 1) * dx;
    const cy = y + dir * i * 1.8 + Math.sin(i * 0.8) * 6;
    ctx.beginPath();
    ctx.moveTo(cx, cy - wickH / 2);
    ctx.lineTo(cx, cy + wickH / 2);
    ctx.stroke();
    ctx.fillRect(cx - 2.5, cy - bodyH / 2, 5, bodyH);
    ctx.strokeRect(cx - 2.5, cy - bodyH / 2, 5, bodyH);
  }
  ctx.restore();
  drawLabel(ctx, "Ghost feed", x + dx, y - 18, "#fff");
}

const LAYER_KINDS = {
  position: { draw: drawPosition },
  long_position: { draw: drawPosition },
  short_position: { draw: drawPosition },
  position_forecast: { draw: drawProjection },
  sector: { draw: drawSector },
  anchored_vwap: { draw: drawAnchoredStudy },
  vwap: { draw: () => {} },
  bollinger_bands: { draw: () => {} },
  anchored_volume_profile: { draw: drawAnchoredStudy },
  fixed_range_volume_profile: { draw: drawRangeStudy },
  price_range: { draw: drawRangeStudy },
  date_range: { draw: drawRangeStudy },
  date_price_range: { draw: drawRangeStudy },
  bars_pattern: { draw: drawBarsPattern },
  ghost_feed: { draw: drawGhostFeed },
  abcd_pattern: { draw: drawPattern },
  xabcd_pattern: { draw: drawPattern },
  volume_bars: { draw: drawVolumeBars },
  equity_drawdown: { draw: drawPerformancePane },
  rsi: { draw: drawOscillatorPane },
  macd: { draw: drawOscillatorPane },
  stochastic: { draw: drawOscillatorPane },
  moving_average: { draw: () => {} },
  returns_distribution: { draw: drawReturnsDistribution },
};

function layerOf(kind) {
  return LAYER_KINDS[kind] || { draw: () => {} };
}
// ---------------------------------------------------------------------------
// Entry points
// ---------------------------------------------------------------------------

function bytesToArrayBuffer(b) {
  if (b instanceof ArrayBuffer) return b;
  if (b instanceof DataView || ArrayBuffer.isView(b)) {
    return b.buffer.slice(b.byteOffset, b.byteOffset + b.byteLength);
  }
  throw new Error("unsupported buffer type");
}

function render({ model, el }) {
  const spec = model.get("spec");
  const buffer = bytesToArrayBuffer(model.get("buffers"));
  const comm = {
    send: (msg) => model.send(msg),
    onMessage: (cb) => {
      const handler = (content, buffers) => cb(content, buffers);
      model.on("msg:custom", handler);
      return () => model.off?.("msg:custom", handler);
    },
  };
  const view = new ChartView(el, spec, buffer, comm);
  return () => view.destroy();
}

/** Standalone (static HTML export — no kernel). Retains CPU f32 copies of
 * scatter x/y so hover can read approximate values without a kernel (§37). */
function renderStandalone(el, spec, arrayBuffer) {
  const buffer = bytesToArrayBuffer(arrayBuffer);
  const view = new ChartView(el, spec, buffer, null);
  for (const g of view.gpuTraces) {
    if (markOf(g.trace.kind).retainCpu && g.tier !== "density") {
      g._cpu = {
        x: new Float32Array(buffer, spec.columns[g.trace.x].byte_offset, spec.columns[g.trace.x].len),
        y: new Float32Array(buffer, spec.columns[g.trace.y].byte_offset, spec.columns[g.trace.y].len),
      };
    }
  }
  return view;
}


window.fastcharts = { render, renderStandalone, ChartView, MARK_KINDS, markOf, LAYER_KINDS, layerOf };
})();

<script>
function createFinanceLayerEditor(view) {
  const palette = document.getElementById("editor-palette");
  const frame = document.getElementById("editor-chart-frame");
  const layerList = document.getElementById("editor-layer-list");
  const status = document.getElementById("editor-status");
  const clearButton = document.getElementById("editor-clear");
  const customIds = new Set();
  let activeTool = null;
  let pointerDrag = null;
  let counter = 1;

  const originalAvwapDraw = fastcharts.LAYER_KINDS.anchored_vwap.draw;
  fastcharts.LAYER_KINDS.anchored_vwap.draw = (chart, ctx, layer) => {
    originalAvwapDraw(chart, ctx, layer);
    if (layer.props && layer.props.series) {
      drawLineSeries(chart, ctx, layer.props.series, layer.style && layer.style.color || "#f59e0b", 1.6);
    }
  };
  fastcharts.LAYER_KINDS.editor_line = {
    draw: (chart, ctx, layer) => drawLineSeries(chart, ctx, layer.props.series, layer.style.color, layer.style.width || 1.5)
  };
  fastcharts.LAYER_KINDS.editor_bollinger = {
    draw: (chart, ctx, layer) => {
      const s = layer.props.series;
      if (!s) return;
      drawLineSeries(chart, ctx, { x: s.x, y: s.upper }, layer.style.band_color || "#7b61ff", 1);
      drawLineSeries(chart, ctx, { x: s.x, y: s.lower }, layer.style.band_color || "#7b61ff", 1);
      drawLineSeries(chart, ctx, { x: s.x, y: s.middle }, layer.style.color || "#6d5dfc", 1.3);
    }
  };

  function candleGpu() {
    return view.gpuTraces.find((g) => g.candle && g.candle.cpu);
  }

  function candleCpu() {
    const g = candleGpu();
    return g ? g.candle.cpu : null;
  }

  function volumeBars() {
    const layer = view.layers.find((item) => item.kind === "volume_bars" && item.props && item.props.bars);
    return layer && layer.props.bars;
  }

  function dataAt(clientX, clientY) {
    const rect = view.root.getBoundingClientRect();
    const sx = clientX - rect.left;
    const sy = clientY - rect.top;
    const p = view.plot;
    const fx = Math.max(0, Math.min(1, (sx - p.x) / p.w));
    const fy = Math.max(0, Math.min(1, (sy - p.y) / p.h));
    return {
      x: view.view.x0 + fx * (view.view.x1 - view.view.x0),
      y: view.view.y1 - fy * (view.view.y1 - view.view.y0),
    };
  }

  function nearestIndex(x) {
    const cpu = candleCpu();
    if (!cpu || !cpu.x.length) return -1;
    let lo = 0;
    let hi = cpu.x.length - 1;
    while (lo < hi) {
      const mid = (lo + hi) >> 1;
      if (cpu.x[mid] < x) lo = mid + 1;
      else hi = mid;
    }
    if (lo > 0 && Math.abs(cpu.x[lo - 1] - x) <= Math.abs(cpu.x[lo] - x)) lo -= 1;
    return lo;
  }

  function dx() {
    const cpu = candleCpu();
    return cpu && Number.isFinite(cpu.dxMed) ? cpu.dxMed : (view.view.x1 - view.view.x0) / 80;
  }

  function nextId(prefix) {
    const id = `edit-${prefix}-${counter}`;
    counter += 1;
    return id;
  }

  function addLayer(layer) {
    view.layers = [...view.layers, layer];
    customIds.add(layer.id);
    renderLayerList();
    view.draw();
    status.textContent = `${labelFor(layer.kind)} added`;
  }

  function removeLayer(id) {
    view.layers = view.layers.filter((layer) => layer.id !== id);
    customIds.delete(id);
    renderLayerList();
    view.draw();
    status.textContent = "Layer removed";
  }

  function labelFor(kind) {
    return {
      position: "Position",
      anchored_vwap: "Anchored VWAP",
      fixed_range_volume_profile: "Fixed profile",
      anchored_volume_profile: "Anchored profile",
      position_forecast: "Forecast",
      sector: "Sector",
      bars_pattern: "Bars pattern",
      ghost_feed: "Ghost feed",
      editor_line: "Moving average",
      editor_bollinger: "Bollinger bands",
      volume_bars: "Volume",
      moving_average: "Moving average",
      bollinger_bands: "Bollinger bands",
      vwap: "VWAP",
    }[kind] || kind;
  }

  function renderLayerList() {
    layerList.replaceChildren();
    const visible = view.layers.filter((layer) => layer.kind !== "volume_bars" || !customIds.has(layer.id));
    for (const layer of visible) {
      const row = document.createElement("div");
      row.className = "editor-layer-row";
      const name = document.createElement("span");
      name.textContent = layer.id || labelFor(layer.kind);
      row.append(name);
      if (layer.id && customIds.has(layer.id)) {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = "Remove";
        button.addEventListener("click", () => removeLayer(layer.id));
        row.append(button);
      }
      layerList.append(row);
    }
  }

  function drawLineSeries(chart, ctx, series, color, width) {
    if (!series || !Array.isArray(series.x) || !Array.isArray(series.y)) return;
    ctx.save();
    ctx.strokeStyle = color || "#2962ff";
    ctx.lineWidth = width || 1.5;
    ctx.beginPath();
    let started = false;
    const n = Math.min(series.x.length, series.y.length);
    for (let i = 0; i < n; i++) {
      const x = Number(series.x[i]);
      const y = Number(series.y[i]);
      if (!Number.isFinite(x) || !Number.isFinite(y)) {
        started = false;
        continue;
      }
      const sx = chart._dataToScreenX(x);
      const sy = chart._dataToScreenY(y);
      if (started) ctx.lineTo(sx, sy);
      else {
        ctx.moveTo(sx, sy);
        started = true;
      }
    }
    ctx.stroke();
    ctx.restore();
  }

  function movingAverageSeries(windowSize) {
    const cpu = candleCpu();
    if (!cpu) return { x: [], y: [] };
    const x = Array.from(cpu.x);
    const y = new Array(cpu.c.length).fill(null);
    let acc = 0;
    for (let i = 0; i < cpu.c.length; i++) {
      acc += cpu.c[i];
      if (i >= windowSize) acc -= cpu.c[i - windowSize];
      if (i >= windowSize - 1) y[i] = acc / windowSize;
    }
    return { x, y };
  }

  function bollingerSeries(windowSize, deviations) {
    const cpu = candleCpu();
    if (!cpu) return { x: [], middle: [], upper: [], lower: [] };
    const x = Array.from(cpu.x);
    const middle = new Array(cpu.c.length).fill(null);
    const upper = new Array(cpu.c.length).fill(null);
    const lower = new Array(cpu.c.length).fill(null);
    for (let i = windowSize - 1; i < cpu.c.length; i++) {
      let sum = 0;
      for (let j = i - windowSize + 1; j <= i; j++) sum += cpu.c[j];
      const avg = sum / windowSize;
      let variance = 0;
      for (let j = i - windowSize + 1; j <= i; j++) variance += (cpu.c[j] - avg) ** 2;
      const std = Math.sqrt(variance / windowSize);
      middle[i] = avg;
      upper[i] = avg + deviations * std;
      lower[i] = avg - deviations * std;
    }
    return { x, middle, upper, lower };
  }

  function anchoredVwapSeries(anchorX) {
    const cpu = candleCpu();
    const bars = volumeBars();
    const start = nearestIndex(anchorX);
    if (!cpu || !bars || start < 0) return { x: [], y: [] };
    const x = [];
    const y = [];
    let pv = 0;
    let volSum = 0;
    for (let i = start; i < cpu.x.length; i++) {
      const vol = Number(bars.volume[i] || 0);
      const typical = (cpu.h[i] + cpu.l[i] + cpu.c[i]) / 3;
      if (Number.isFinite(vol) && vol > 0) {
        pv += typical * vol;
        volSum += vol;
      }
      x.push(cpu.x[i]);
      y.push(volSum > 0 ? pv / volSum : null);
    }
    return { x, y };
  }

  function volumeProfile(startX, endX, rows) {
    const cpu = candleCpu();
    const bars = volumeBars();
    if (!cpu || !bars) return null;
    const loX = Math.min(startX, endX);
    const hiX = Math.max(startX, endX);
    const idxs = [];
    let lowEdge = Infinity;
    let highEdge = -Infinity;
    for (let i = 0; i < cpu.x.length; i++) {
      if (cpu.x[i] < loX || cpu.x[i] > hiX) continue;
      idxs.push(i);
      lowEdge = Math.min(lowEdge, cpu.l[i]);
      highEdge = Math.max(highEdge, cpu.h[i]);
    }
    if (!idxs.length || !Number.isFinite(lowEdge) || !Number.isFinite(highEdge)) return null;
    if (lowEdge === highEdge) {
      lowEdge -= 1;
      highEdge += 1;
    }
    const rowCount = Math.max(8, rows || 56);
    const step = (highEdge - lowEdge) / rowCount;
    const total = new Array(rowCount).fill(0);
    const up = new Array(rowCount).fill(0);
    const down = new Array(rowCount).fill(0);
    for (const i of idxs) {
      const barLow = Math.min(cpu.l[i], cpu.h[i]);
      const barHigh = Math.max(cpu.l[i], cpu.h[i]);
      const span = Math.max(barHigh - barLow, 1e-9);
      const vol = Number(bars.volume[i] || 0);
      const first = Math.max(0, Math.min(rowCount - 1, Math.floor((barLow - lowEdge) / step)));
      const last = Math.max(0, Math.min(rowCount - 1, Math.floor((barHigh - lowEdge) / step)));
      for (let r = first; r <= last; r++) {
        const rowLow = lowEdge + r * step;
        const rowHigh = rowLow + step;
        const overlap = Math.max(0, Math.min(barHigh, rowHigh) - Math.max(barLow, rowLow));
        if (overlap <= 0) continue;
        const share = vol * overlap / span;
        total[r] += share;
        if (cpu.c[i] >= cpu.o[i]) up[r] += share;
        else down[r] += share;
      }
    }
    const maxTotal = Math.max(...total, 0);
    const pocIndex = total.indexOf(maxTotal);
    return {
      price_low: total.map((_, i) => lowEdge + i * step),
      price_high: total.map((_, i) => lowEdge + (i + 1) * step),
      price_mid: total.map((_, i) => lowEdge + (i + 0.5) * step),
      total,
      up,
      down,
      delta: total.map((_, i) => up[i] - down[i]),
      value_area: total.map((v) => v >= maxTotal * 0.34),
      poc_index: pocIndex,
      max_total: maxTotal,
      rows: rowCount,
    };
  }

  function ghostFeed(anchor, bars) {
    const cpu = candleCpu();
    const start = nearestIndex(anchor.x);
    if (!cpu || start < 0) return null;
    const out = { x: [], open: [], high: [], low: [], close: [] };
    let lastClose = anchor.y;
    const step = dx();
    for (let i = 0; i < bars; i++) {
      const drift = 0.42 * i + Math.sin(i * 0.75) * 1.4;
      const open = lastClose;
      const close = anchor.y + drift + (i % 3 - 1) * 0.9;
      const high = Math.max(open, close) + 2.2 + (i % 4) * 0.35;
      const low = Math.min(open, close) - 1.8 - (i % 5) * 0.25;
      out.x.push(anchor.x + step * (i + 1));
      out.open.push(open);
      out.high.push(high);
      out.low.push(low);
      out.close.push(close);
      lastClose = close;
    }
    return out;
  }

  function makeLayer(tool, point) {
    const span = dx();
    const id = nextId(tool.replace(/_/g, "-"));
    const candle = candleCpu();
    const idx = nearestIndex(point.x);
    const snapX = idx >= 0 && candle ? candle.x[idx] : point.x;
    const snapY = idx >= 0 && candle ? candle.c[idx] : point.y;
    const anchor = { x: snapX, y: point.y };
    if (tool === "long_position") {
      const entry = Math.max(point.y, 1);
      return {
        role: "drawing",
        kind: "position",
        id,
        source: "price",
        side: "long",
        anchors: { entry: { x: snapX, y: entry }, stop: { y: entry * 0.96 }, target: { y: entry * 1.08 }, end: { x: snapX + span * 28 } },
        metrics: { risk_reward: 2 },
        style: { target_color: "#22ab94", stop_color: "#f23645", line_color: "#111827" },
      };
    }
    if (tool === "short_position") {
      const entry = Math.max(point.y, 1);
      return {
        role: "drawing",
        kind: "position",
        id,
        source: "price",
        side: "short",
        anchors: { entry: { x: snapX, y: entry }, stop: { y: entry * 1.06 }, target: { y: entry * 0.92 }, end: { x: snapX + span * 28 } },
        metrics: { risk_reward: 1.33 },
        style: { target_color: "#22ab94", stop_color: "#f23645", line_color: "#111827" },
      };
    }
    if (tool === "anchored_vwap") {
      return {
        role: "study",
        kind: "anchored_vwap",
        id,
        source: "price",
        anchors: { anchor },
        props: { price: "hlc3", bands: [], series: anchoredVwapSeries(snapX) },
        style: { color: "#f59e0b", width: 1.5 },
      };
    }
    if (tool === "anchored_volume_profile") {
      const profile = volumeProfile(snapX, view.view.x1, 56);
      return {
        role: "study",
        kind: "anchored_volume_profile",
        id,
        source: "price",
        anchors: { anchor },
        props: { rows: 56, volume: "up_down", value_area: 0.7, profile },
        style: { color: "#667085", up_color: "#22ab94", down_color: "#f23645", poc_color: "#f59e0b" },
      };
    }
    if (tool === "fixed_range_volume_profile") {
      const start = snapX - span * 24;
      const end = snapX + span * 24;
      const profile = volumeProfile(start, end, 56);
      return {
        role: "study",
        kind: "fixed_range_volume_profile",
        id,
        source: "price",
        anchors: { start: { x: start, y: point.y }, end: { x: end, y: point.y } },
        props: { rows: 56, volume: "up_down", value_area: 0.7, profile },
        style: { color: "#667085", up_color: "#22ab94", down_color: "#f23645", poc_color: "#f59e0b" },
      };
    }
    if (tool === "position_forecast") {
      return {
        role: "drawing",
        kind: "position_forecast",
        id,
        source: "price",
        anchors: { start: { x: snapX, y: snapY }, target: { x: snapX + span * 22, y: point.y } },
        style: { color: "#2563eb" },
      };
    }
    if (tool === "sector") {
      return {
        role: "drawing",
        kind: "sector",
        id,
        source: "price",
        anchors: { origin: { x: snapX, y: snapY }, horizon: { x: snapX + span * 28 }, target: { x: snapX + span * 28, y: point.y } },
        style: { color: "#7c3aed" },
      };
    }
    if (tool === "bars_pattern") {
      const start = Math.max(0, idx - 28);
      const end = Math.max(start + 4, idx - 4);
      const pattern = candle ? {
        x: Array.from(candle.x.slice(start, end)).map((x, i) => snapX + span * (i + 1)),
        open: Array.from(candle.o.slice(start, end)),
        high: Array.from(candle.h.slice(start, end)),
        low: Array.from(candle.l.slice(start, end)),
        close: Array.from(candle.c.slice(start, end)),
      } : null;
      return {
        role: "drawing",
        kind: "bars_pattern",
        id,
        source: "price",
        anchors: { start: { bar: start }, end: { bar: end }, destination: { x: snapX, y: point.y } },
        props: { mode: "candlestick", pattern },
        style: { color: "#667085", opacity: 0.74 },
      };
    }
    if (tool === "ghost_feed") {
      return {
        role: "drawing",
        kind: "ghost_feed",
        id,
        source: "price",
        anchors: { anchor: { x: snapX, y: point.y } },
        props: { bars: 24, direction: "up", feed: ghostFeed({ x: snapX, y: point.y }, 24) },
        style: { color: "#475467", opacity: 0.44 },
      };
    }
    if (tool === "moving_average") {
      return {
        role: "study",
        kind: "editor_line",
        id,
        source: "price",
        props: { series: movingAverageSeries(20) },
        style: { color: "#2563eb", width: 1.4 },
      };
    }
    if (tool === "bollinger_bands") {
      return {
        role: "study",
        kind: "editor_bollinger",
        id,
        source: "price",
        props: { series: bollingerSeries(20, 2) },
        style: { color: "#6d5dfc", band_color: "#7b61ff" },
      };
    }
    return null;
  }

  function addTool(tool, point) {
    const layer = makeLayer(tool, point);
    if (!layer) {
      status.textContent = "No layer added";
      return;
    }
    addLayer(layer);
  }

  palette.addEventListener("dragstart", (event) => {
    const tool = event.target.closest("[data-tool]")?.dataset.tool;
    if (!tool) return;
    event.dataTransfer.setData("text/plain", tool);
    event.dataTransfer.effectAllowed = "copy";
  });

  palette.addEventListener("click", (event) => {
    if (pointerDrag && pointerDrag.suppressClick) {
      pointerDrag = null;
      return;
    }
    const item = event.target.closest("[data-tool]");
    if (!item) return;
    activeTool = item.dataset.tool;
    for (const el of palette.querySelectorAll("[data-tool]")) el.classList.toggle("active", el === item);
    status.textContent = item.textContent;
  });

  palette.addEventListener("pointerdown", (event) => {
    const item = event.target.closest("[data-tool]");
    if (!item || event.button !== 0) return;
    event.preventDefault();
    const ghost = item.cloneNode(true);
    ghost.className = "editor-drag-ghost";
    document.body.append(ghost);
    pointerDrag = {
      tool: item.dataset.tool,
      ghost,
      startX: event.clientX,
      startY: event.clientY,
      moved: false,
      suppressClick: false,
    };
    moveGhost(event.clientX, event.clientY);
    item.setPointerCapture?.(event.pointerId);
  });

  document.addEventListener("pointermove", (event) => {
    if (!pointerDrag) return;
    const dist = Math.hypot(event.clientX - pointerDrag.startX, event.clientY - pointerDrag.startY);
    pointerDrag.moved = pointerDrag.moved || dist > 4;
    if (pointerDrag.moved) {
      event.preventDefault();
      frame.classList.add("drag-over");
      moveGhost(event.clientX, event.clientY);
    }
  });

  document.addEventListener("pointerup", (event) => {
    if (!pointerDrag) return;
    const drag = pointerDrag;
    frame.classList.remove("drag-over");
    drag.ghost.remove();
    const target = document.elementFromPoint(event.clientX, event.clientY);
    const overChart = target && frame.contains(target);
    if (drag.moved && overChart) {
      drag.suppressClick = true;
      addTool(drag.tool, dataAt(event.clientX, event.clientY));
    }
    pointerDrag = drag.suppressClick ? drag : null;
  });

  function moveGhost(x, y) {
    if (!pointerDrag || !pointerDrag.ghost) return;
    pointerDrag.ghost.style.transform = `translate(${x + 10}px, ${y + 10}px)`;
  }

  frame.addEventListener("dragover", (event) => {
    event.preventDefault();
    frame.classList.add("drag-over");
  });

  frame.addEventListener("dragleave", () => frame.classList.remove("drag-over"));

  frame.addEventListener("drop", (event) => {
    event.preventDefault();
    frame.classList.remove("drag-over");
    const tool = event.dataTransfer.getData("text/plain");
    if (!tool) return;
    addTool(tool, dataAt(event.clientX, event.clientY));
  });

  view.canvas.addEventListener("click", (event) => {
    if (!activeTool) return;
    addTool(activeTool, dataAt(event.clientX, event.clientY));
  });

  clearButton.addEventListener("click", () => {
    view.layers = view.layers.filter((layer) => !customIds.has(layer.id));
    customIds.clear();
    renderLayerList();
    view.draw();
    status.textContent = "Cleared";
  });

  renderLayerList();
  return { addTool, removeLayer };
}
</script>
