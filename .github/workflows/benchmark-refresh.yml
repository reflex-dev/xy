name: Benchmark refresh

# Regenerate the cross-library benchmark tables (README "10M-point native
# benchmark" and "Core 2D benchmark") from a real, consistent Ubuntu run —
# the source those "pending CI refresh" rows are waiting on. Manual only: it
# installs plotting libraries and runs 10M-point comparisons, so it is far too
# heavy for every push. Download the uploaded benchmark JSON and update the
# README/docs tables from it (numbers must be measured, never invented — §2).
on:
  workflow_dispatch:
    inputs:
      sizes:
        description: Scatter sizes for the cross-library comparison.
        type: string
        default: "1e3,1e4,1e5,1e6,1e7"
      budget:
        description: Per-config wall-clock budget (seconds) before a library is marked over-budget.
        type: string
        default: "45"

jobs:
  cross-library:
    name: Cross-library benchmark (Ubuntu, native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - name: Build native core
        run: cargo build --release
      - name: Install package + comparison deps
        # Install the full adapter set. In particular, a density-mode FastCharts
        # row must publish beside Datashader/HoloViews rather than only raw-marker
        # competitors; unavailable rows remain explicit in the report.
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv pip install matplotlib seaborn plotly kaleido bokeh altair \
            datashader hvplot plotly-resampler psutil
      - name: Verify native backend is active
        run: uv run python -c "import fastcharts.kernels as k; assert k.BACKEND == 'native', k.BACKEND; print('native')"
      # The 10M scatter table (the one with the actual "pending" Seaborn rows)
      # needs no browser, so it runs first and independently — a Chromium/TTFR
      # problem downstream must not skip it.
      - name: Cross-library scatter comparison (10M table)
        run: |
          uv run python benchmarks/bench_vs.py \
            --sizes "${{ inputs.sizes }}" --budget "${{ inputs.budget }}" \
            --json scatter-vs.json --out scatter-vs.md
          uv run python scripts/verify_benchmark_report.py scatter-vs.json --kind scatter-vs
      - name: Install Chromium (Playwright)
        # Playwright's Chromium, matching ci.yml — Ubuntu's apt/snap chromium is
        # unreliable headless. Playwright ships as an npm package here, not a
        # Python one, so resolve the binary via node.
        if: always()
        run: |
          npm i --no-save playwright@1.48
          npx playwright install --with-deps chromium
      - name: Core-2D comparison with headless-Chrome TTFR (core-2d table)
        if: always()
        run: |
          chromium="$(node -e "console.log(require('playwright').chromium.executablePath())")"
          PYTHONPATH=python uv run python benchmarks/bench_2d_charts.py \
            --profile standard --ttfr --chromium "$chromium" \
            --json core-2d.json --out core-2d.md
          uv run python scripts/verify_benchmark_report.py core-2d.json --kind core-2d
      - name: Upload refreshed benchmark reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-refresh
          if-no-files-found: warn
          path: |
            scatter-vs.json
            scatter-vs.md
            core-2d.json
            core-2d.md
