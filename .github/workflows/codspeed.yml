name: CodSpeed

on:
  push:
    branches: ["main"]
  pull_request:
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # for OpenID Connect authentication with CodSpeed

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to full-length commit SHAs (repo policy requires it);
      # the trailing comment records the human-readable version each SHA maps to.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      # The native Rust core must be present so the benchmarks measure the
      # native kernels (BACKEND == "native"); without it, importing the compute
      # layer errors rather than running.
      - name: Build native core
        run: cargo build --release

      - name: Install package + benchmark deps
        env:
          FASTCHARTS_REQUIRE_CARGO: "1"
        run: |
          uv venv .venv
          uv pip install -p .venv/bin/python -e ".[dev]" pytest-codspeed

      - name: Verify native benchmark backend
        run: |
          .venv/bin/python - <<'PY'
          import fastcharts.kernels as k
          assert k.BACKEND == "native", f"CodSpeed requires native backend, got {k.BACKEND!r}"
          PY

      - name: Run benchmarks
        uses: CodSpeedHQ/action@9f3a37ece7abc84992501a7fcd54d1704f3458fa # v4
        with:
          mode: simulation
          run: .venv/bin/python -m pytest benchmarks/test_codspeed_kernels.py --codspeed
