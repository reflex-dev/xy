# TEMPORARY branch-only helper: this development sandbox has no PyPI/npm/
# crates.io egress, so the vite bundle regeneration, ruff, and the full pytest
# suite run here instead. It commits the regenerated static bundles (and any
# ruff-format fixes) back to the branch. Deleted before merge.
name: tmp-append-perf

on:
  push:
    branches: ["claude/trace-append-perf-sbf211"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  regen-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: claude/trace-append-perf-sbf211
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Rebuild committed JS bundles
        run: |
          npm ci
          node js/build.mjs

      - name: Build native core + install package
        run: |
          cargo build --release
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff (apply format, then check)
        run: |
          uv run ruff format .
          uv run ruff check .

      - name: Commit regenerated bundles / format fixes back to the branch
        run: |
          git config user.name "Alek Petuskey"
          git config user.email "alek@reflex.dev"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Regenerate static JS bundles; apply ruff format"
            git push origin HEAD:claude/trace-append-perf-sbf211
          else
            echo "bundles and formatting already fresh"
          fi

      - name: Repository hooks
        run: uv run --with pre-commit pre-commit run --all-files

      - name: Pytest (full suite)
        run: uv run pytest -q

      - name: Type check
        run: uv run ty check

      - name: Chromium append-stream + render smokes (rebuilt bundle)
        run: |
          npx playwright install --with-deps chromium
          CHROME=$(node -e "console.log(require('playwright').chromium.executablePath())")
          python3 scripts/render_smoke_nonumpy.py "$CHROME"
          python3 scripts/append_stream_smoke.py "$CHROME"

      - name: Append wire/kernel accounting (PR numbers)
        run: |
          uv run python - <<'PY'
          import json
          import time

          import numpy as np

          from xy._figure import Figure

          for n in (10_000, 100_000, 1_000_000):
              fig = Figure().scatter(
                  np.arange(float(n)), np.sin(np.arange(float(n)) * 1e-3)
              )
              fig.build_payload()
              # warm-up append, then timed steady-state ticks
              fig.append(0, [float(n)], [0.0])
              ticks = 20
              t0 = time.perf_counter()
              for i in range(ticks):
                  msg, bufs = fig.append(0, [float(n + 1 + i)], [0.0])
              dt = (time.perf_counter() - t0) / ticks
              spec_bytes = len(json.dumps(msg["spec"]).encode())
              blob_bytes = len(bufs[0])
              tick = spec_bytes + blob_bytes
              print(
                  f"n={n:>9,}: append_data={dt * 1e3:7.2f} ms/tick  "
                  f"spec={spec_bytes:,} B  blob={blob_bytes:,} B  "
                  f"widget wire/tick: before=2x={2 * tick:,} B  after=1x={tick:,} B"
              )
          PY
