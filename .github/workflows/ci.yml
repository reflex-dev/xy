name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (Rust + Python + JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Rust unit tests
        run: cargo test

      - name: Rust lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Build native core
        run: cargo build --release

      - name: Build JS client
        run: node js/build.mjs

      - name: JS parses (ESM + IIFE)
        run: |
          node -e "import('./python/fastcharts/static/index.js').then(m => { if (!m.default.render) throw new Error('no render export'); })"
          node --check python/fastcharts/static/standalone.js

      # Dependency-free gates — verify the two seams cargo can't (the C ABI and
      # the WebGL2 render path) and run even if PyPI is unreachable.
      - name: Native ABI smoke (stdlib only)
        run: python3 scripts/abi_smoke.py

      # Playwright's Chromium, not the apt/snap one: Ubuntu's chromium-browser is
      # a confined snap that can't read the temp HTML under /tmp and whose GPU
      # process crashes headless — it fails the render probe for environment
      # reasons, not code. Playwright ships an unconfined build.
      - name: Install Chromium (Playwright)
        run: |
          npm i --no-save playwright@1.48
          npx playwright install --with-deps chromium
      - name: Headless render smoke (stdlib + Chromium)
        run: |
          CHROME=$(node -e "console.log(require('playwright').chromium.executablePath())")
          echo "using $CHROME"
          python3 scripts/render_smoke_nonumpy.py "$CHROME"

      - name: Native benchmark (stdlib only — executed numbers, no PyPI needed)
        run: python3 scripts/bench_native.py --sizes 1e5,1e6

      - name: Install package + dev deps
        run: |
          uv venv .venv
          uv pip install -p .venv/bin/python -e ".[dev]"

      - name: Lint (ruff)
        run: |
          .venv/bin/ruff check .
          .venv/bin/ruff format --check .

      # ty is pre-1.0 (0.0.x) and advisory here: it type-checks the shippable
      # library and reports findings, but doesn't gate the build — pytest, ruff,
      # and cargo are the hard gates. Test/benchmark code intentionally
      # subscripts known-non-None Optionals, which ty can't narrow.
      - name: Typecheck (ty, advisory)
        run: .venv/bin/ty check python || echo "::warning::ty reported type findings (advisory)"

      - name: Python tests (native core)
        run: .venv/bin/pytest -q

      - name: Python tests (NumPy fallback — §33 no-wheel contract)
        run: FASTCHARTS_FORCE_FALLBACK=1 .venv/bin/pytest -q

      - name: Benchmark smoke (1e5/1e6 — §12 harness runs every phase)
        run: .venv/bin/python scripts/bench.py --sizes 1e5,1e6

  # Cross-library scatter benchmark incl. time-to-first-render (docs/benchmark.md).
  # Non-blocking: it's a measurement, not a gate. Uploads the report as an
  # artifact and prints it to the log.
  benchmark:
    name: Benchmark vs Python charting libraries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build core + JS client
        run: |
          node js/build.mjs
          cargo build --release
      - name: Install fastcharts + competitors
        run: |
          uv venv .venv
          uv pip install -p .venv/bin/python -e .
          uv pip install -p .venv/bin/python matplotlib seaborn plotly kaleido bokeh altair datashader hvplot psutil
      # Playwright Chromium for the time-to-first-render (browser paint) pass.
      - name: Install Chromium (Playwright)
        run: |
          npm i --no-save playwright@1.48
          npx playwright install --with-deps chromium
      - name: Run cross-library benchmark (with TTFR)
        run: |
          CHROME=$(node -e "console.log(require('playwright').chromium.executablePath())")
          .venv/bin/python scripts/bench_vs.py \
            --sizes 1e3,1e4,1e5,1e6,3e6,1e7 --budget 45 \
            --ttfr --ttfr-max-n 1e5 --chromium "$CHROME" \
            --out docs/benchmark_ci.md --json benchmark.json
      - name: Show report
        run: cat docs/benchmark_ci.md
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: |
            docs/benchmark_ci.md
            benchmark.json

  # Wheel matrix (§33): a missing wheel is a build failure, not a runtime
  # surprise. The core is a C-ABI cdylib → one `py3-none-<platform>` wheel per
  # platform covers every CPython version.
  wheels:
    name: Wheel ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-13, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build JS client
        run: node js/build.mjs

      - name: Build wheel
        # REQUIRE_CARGO: a published wheel must carry the native core — never
        # silently fall back to pure-Python at wheel-build time.
        env:
          FASTCHARTS_REQUIRE_CARGO: "1"
        run: uv build --wheel

      # A raw linux_x86_64 tag is not installable off this machine and PyPI
      # rejects it; auditwheel relabels to manylinux (our cdylib needs only
      # libc/libm, so there's nothing external to bundle). The glibc floor is
      # the runner's; a manylinux-container build (cibuildwheel) would lower it.
      - name: Repair Linux wheel to manylinux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y patchelf
          uv tool install auditwheel
          uv tool run auditwheel repair dist/*.whl -w wheelhouse
          rm dist/*.whl && mv wheelhouse/*.whl dist/
          ls -la dist/

      - name: Install-size budget (≤ 15 MB, §33)
        shell: bash
        run: |
          # wc -c is portable (macOS/BSD du has no -b); trim BSD's leading spaces.
          whl=$(ls dist/*.whl)
          size=$(wc -c < "$whl" | tr -d ' ')
          echo "wheel size: $size bytes ($whl)"
          test "$size" -le 15728640

      - name: Smoke-install and import
        shell: bash
        run: |
          uv venv smoke
          uv pip install -p smoke dist/*.whl numpy anywidget
          ./smoke/bin/python -c "import fastcharts, fastcharts.kernels as k; assert k.BACKEND == 'native', k.BACKEND; print('native core loaded')" \
            || ./smoke/Scripts/python.exe -c "import fastcharts, fastcharts.kernels as k; assert k.BACKEND == 'native', k.BACKEND; print('native core loaded')"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl

  # Proves the ergonomics promise: a source build with NO Rust toolchain still
  # installs and works (pure-Python wheel + NumPy fallback), never erroring.
  install_without_rust:
    name: Install without Rust (NumPy fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # GitHub runners ship Rust preinstalled (the first run of this job proved
      # it by happily compiling the core!) — strip every cargo from PATH so the
      # build genuinely exercises the no-toolchain path.
      - name: Remove preinstalled Rust
        run: |
          while p=$(command -v cargo 2>/dev/null); do
            echo "removing $p"; sudo rm -f "$p"
          done
          if command -v cargo; then echo "cargo still present"; exit 1; fi
          echo "cargo is gone"
      - name: Build wheel with no toolchain
        run: uv build --wheel
      - name: Wheel is pure-Python (py3-none-any)
        shell: bash
        run: ls dist/ && ls dist/*-py3-none-any.whl
      - name: Install and verify it works via the fallback
        shell: bash
        run: |
          uv venv smoke
          uv pip install -p smoke dist/*.whl numpy anywidget
          ./smoke/bin/python - <<'PY'
          import warnings, numpy as np
          with warnings.catch_warnings(record=True) as w:
              warnings.simplefilter("always")
              import fastcharts.kernels as k
              from fastcharts import Figure
          assert k.BACKEND == "numpy", k.BACKEND
          spec, blob = Figure().scatter(np.arange(5.0), np.arange(5.0)).build_payload()
          assert len(blob) > 0
          assert any("NumPy fallback" in str(x.message) for x in w), "expected loud fallback warning"
          print("pure-Python install OK; backend:", k.BACKEND)
          PY
