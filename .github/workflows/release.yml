name: Release

# Publish prebuilt wheels + sdist to PyPI on a version tag. This is what makes
# `pip install fastcharts` a no-toolchain install: each platform wheel carries
# the compiled Rust core, so end users never see Rust or Node.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: >-
          Dry run: build and verify every wheel/sdist/wasm artifact across the
          full release matrix without publishing to PyPI. Use this to validate
          the cross-compile matrix (musllinux, win-arm64, wasm, ...) before a
          real version-tag release. Defaults to true so a manual dispatch
          never accidentally publishes.
        type: boolean
        default: true

jobs:
  # One wheel per platform (the C-ABI core is CPython-version-independent, so
  # each entry produces a single py3-none-<platform> wheel). Coverage matches
  # what the native core can target: Linux glibc + musl across x86-64/aarch64/
  # armv7, macOS x86-64/arm64, and Windows x86/x64/arm64. Linux targets are
  # cross-compiled with cargo-zigbuild (musl support + a low manylinux_2_17
  # glibc floor without QEMU); the hook then packs the prebuilt core and stamps
  # the platform tag (FASTCHARTS_CARGO_TARGET / FASTCHARTS_WHEEL_PLATFORM).
  wheels:
    name: Wheel ${{ matrix.plat }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc (manylinux_2_17 floor) — cross-compiled with zig.
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, zigtarget: x86_64-unknown-linux-gnu.2.17, plat: manylinux_2_17_x86_64, zig: true, native: true }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, zigtarget: aarch64-unknown-linux-gnu.2.17, plat: manylinux_2_17_aarch64, zig: true, native: false }
          - { os: ubuntu-latest, target: armv7-unknown-linux-gnueabihf, zigtarget: armv7-unknown-linux-gnueabihf.2.17, plat: manylinux_2_17_armv7l, zig: true, native: false }
          # Linux musl / Alpine.
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, zigtarget: x86_64-unknown-linux-musl, plat: musllinux_1_2_x86_64, zig: true, native: false }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, zigtarget: aarch64-unknown-linux-musl, plat: musllinux_1_2_aarch64, zig: true, native: false }
          - { os: ubuntu-latest, target: armv7-unknown-linux-musleabihf, zigtarget: armv7-unknown-linux-musleabihf, plat: musllinux_1_2_armv7l, zig: true, native: false }
          # macOS (native per runner arch).
          - { os: macos-13, target: x86_64-apple-darwin, plat: macosx_10_12_x86_64, zig: false, native: true }
          - { os: macos-14, target: aarch64-apple-darwin, plat: macosx_11_0_arm64, zig: false, native: true }
          # Windows x64 (native), x86 and arm64 (cross-compiled).
          - { os: windows-latest, target: x86_64-pc-windows-msvc, plat: win_amd64, zig: false, native: true }
          - { os: windows-latest, target: i686-pc-windows-msvc, plat: win32, zig: false, native: false }
          - { os: windows-latest, target: aarch64-pc-windows-msvc, plat: win_arm64, zig: false, native: false }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify committed JS bundles are fresh
        run: node js/build.mjs --check
      - name: Build JS client
        run: node js/build.mjs
      - name: Cross-compile the native core (zig)
        if: matrix.zig
        run: |
          uv tool install cargo-zigbuild
          uv tool run cargo-zigbuild build --release --target ${{ matrix.zigtarget }}
      - name: Compile the native core
        if: ${{ !matrix.zig }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build the platform wheel
        shell: bash
        env:
          # The core is prebuilt above; the hook only packs it and stamps the
          # platform tag. REQUIRE_CARGO keeps a coreless wheel from shipping.
          FASTCHARTS_REQUIRE_CARGO: "1"
          FASTCHARTS_SKIP_CARGO: "1"
          FASTCHARTS_CARGO_TARGET: ${{ matrix.target }}
          FASTCHARTS_WHEEL_PLATFORM: ${{ matrix.plat }}
        run: uv build --wheel
      - name: Verify wheel contents
        shell: bash
        run: |
          whl=$(ls dist/*.whl)
          python scripts/verify_wheel.py "$whl" --expect-native
      - name: Install-size budget (<= 15 MB)
        shell: bash
        run: |
          whl=$(ls dist/*.whl)
          size=$(wc -c < "$whl" | tr -d ' ')
          echo "wheel size: $size bytes ($whl)"
          test "$size" -le 15728640
      - name: Verify the wheel installs and loads the native core
        # Only host-arch wheels can be imported on the runner; cross-compiled
        # arches (aarch64/armv7/win-arm64/win32) are content-verified instead.
        if: matrix.native
        shell: bash
        run: |
          uv venv smoke
          uv pip install -p smoke dist/*.whl numpy anywidget
          ./smoke/bin/python -c "import fastcharts.kernels as k; assert k.BACKEND=='native', k.BACKEND; print('native', k.__file__)" \
            || ./smoke/Scripts/python.exe -c "import fastcharts.kernels as k; assert k.BACKEND=='native', k.BACKEND; print('native')"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.plat }}
          path: dist/*.whl

  # Best-effort Pyodide / Emscripten WASM wheel for in-browser CPython. The core
  # cross-compiles to wasm32-unknown-emscripten; loading a side-module cdylib via
  # ctypes under Pyodide is the remaining risk, so this job is non-blocking and
  # the wheel is treated as experimental (see docs/production-readiness.md).
  wasm:
    name: Wheel pyodide (experimental)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: mymindstorm/setup-emsdk@v14
      - name: Verify committed JS bundles are fresh
        run: node js/build.mjs --check
      - name: Build JS client
        run: node js/build.mjs
      - name: Cross-compile the native core (emscripten)
        run: cargo build --release --target wasm32-unknown-emscripten
      - name: Build the Pyodide wheel
        shell: bash
        env:
          FASTCHARTS_REQUIRE_CARGO: "1"
          FASTCHARTS_SKIP_CARGO: "1"
          FASTCHARTS_CARGO_TARGET: wasm32-unknown-emscripten
          FASTCHARTS_WHEEL_PLATFORM: pyodide_2024_0_wasm32
        run: uv build --wheel
      - name: Verify wheel contents
        shell: bash
        run: |
          whl=$(ls dist/*.whl)
          python scripts/verify_wheel.py "$whl" --expect-native
      - uses: actions/upload-artifact@v4
        with:
          name: dist-pyodide
          path: dist/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # The sdist carries the committed JS bundle; it builds the Rust core on the
      # user's machine if they install from sdist and have a toolchain, else it
      # falls back to NumPy (hatch_build.py). Wheels are the normal path.
      - name: Verify committed JS bundles are fresh
        run: node js/build.mjs --check
      - name: Build sdist
        run: uv build --sdist
      - name: Verify sdist contents
        shell: bash
        run: |
          sdist=$(ls dist/*.tar.gz)
          python scripts/verify_sdist.py "$sdist"
      - name: Verify sdist without Rust errors clearly on import
        shell: bash
        env:
          FASTCHARTS_SKIP_CARGO: "1"
        run: |
          uv venv smoke
          uv pip install -p smoke dist/*.tar.gz numpy anywidget
          ./smoke/bin/python - <<'PY'
          # No native core and no fallback: the compute layer must raise a
          # clear, actionable error (§33: no-wheel behavior is defined).
          import fastcharts

          assert fastcharts.__version__
          try:
              import fastcharts.kernels  # noqa: F401
          except ImportError as err:
              msg = str(err)
              assert "native Rust core" in msg, msg
              assert "rustup.rs" in msg, msg
              print("sdist without Rust errors clearly on import")
          else:
              raise SystemExit("expected ImportError without the native core")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    # wasm is best-effort (continue-on-error), so it never blocks the release; its
    # artifact is collected by the dist-* download pattern when it succeeds.
    needs: [wheels, sdist, wasm]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing (OIDC) — no API token stored
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      # A manual workflow_dispatch defaults to dry_run=true: every wheel/sdist/
      # wasm artifact is built and verified above, but nothing is uploaded to
      # PyPI. Use this to validate the full cross-compile matrix before a real
      # version-tag release. A tag push always publishes for real.
      - name: Dry run summary (no PyPI publish)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: |
          echo "::notice::Dry run — built and verified $(ls dist/*.whl dist/*.tar.gz 2>/dev/null | wc -l | tr -d ' ') artifacts across the full release matrix. Skipping PyPI publish."
          echo "Re-run this workflow with dry_run=false, or push a v* tag, to publish for real."
      - uses: pypa/gh-action-pypi-publish@release/v1
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        with:
          packages-dir: dist/
