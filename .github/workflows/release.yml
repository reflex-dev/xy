name: Release

# Publish prebuilt wheels + sdist to PyPI on a version tag. This is what makes
# `pip install fastcharts` a no-toolchain install: each platform wheel carries
# the compiled Rust core, so end users never see Rust or Node.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  wheels:
    name: Wheel ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-13, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify committed JS bundles are fresh
        run: node js/build.mjs --check
      - name: Build JS client
        run: node js/build.mjs
      - name: Build wheel (native core required)
        env:
          FASTCHARTS_REQUIRE_CARGO: "1"
        run: uv build --wheel
      - name: Repair Linux wheel to manylinux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y patchelf
          uv tool install auditwheel
          uv tool run auditwheel repair dist/*.whl -w wheelhouse
          rm dist/*.whl && mv wheelhouse/*.whl dist/
      - name: Verify wheel contents
        shell: bash
        run: |
          whl=$(ls dist/*.whl)
          python scripts/verify_wheel.py "$whl" --expect-native
      - name: Install-size budget (<= 15 MB)
        shell: bash
        run: |
          whl=$(ls dist/*.whl)
          size=$(wc -c < "$whl" | tr -d ' ')
          echo "wheel size: $size bytes ($whl)"
          test "$size" -le 15728640
      - name: Verify the wheel installs and loads the native core
        shell: bash
        run: |
          uv venv smoke
          uv pip install -p smoke dist/*.whl numpy anywidget
          ./smoke/bin/python -c "import fastcharts.kernels as k; assert k.BACKEND=='native', k.BACKEND; print('native', k.__file__)" \
            || ./smoke/Scripts/python.exe -c "import fastcharts.kernels as k; assert k.BACKEND=='native', k.BACKEND; print('native')"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # The sdist carries the committed JS bundle; it builds the Rust core on the
      # user's machine if they install from sdist and have a toolchain, else it
      # falls back to NumPy (hatch_build.py). Wheels are the normal path.
      - name: Verify committed JS bundles are fresh
        run: node js/build.mjs --check
      - name: Build sdist
        run: uv build --sdist
      - name: Verify sdist contents
        shell: bash
        run: |
          sdist=$(ls dist/*.tar.gz)
          python scripts/verify_sdist.py "$sdist"
      - name: Verify sdist installs via fallback
        shell: bash
        env:
          FASTCHARTS_SKIP_CARGO: "1"
        run: |
          uv venv smoke
          uv pip install -p smoke dist/*.tar.gz numpy anywidget
          ./smoke/bin/python - <<'PY'
          import warnings
          import numpy as np

          with warnings.catch_warnings(record=True) as w:
              warnings.simplefilter("always")
              import fastcharts.kernels as k
              from fastcharts import Figure

          assert k.BACKEND == "numpy", k.BACKEND
          spec, blob = Figure().scatter(np.arange(5.0), np.arange(5.0)).build_payload()
          assert spec["traces"] and len(blob) > 0
          assert any("NumPy fallback" in str(x.message) for x in w), "expected fallback warning"
          print("sdist fallback install OK")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing (OIDC) — no API token stored
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
